<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">Operations Console</span>
  </div>

  <div class="topbar-right">
    <div class="config-wrap">
      <button class="icon-btn" (click)="toggleConfig()" pTooltip="Theme" tooltipPosition="bottom">
        <i class="pi pi-palette"></i>
      </button>

      @if (configOpen) {
        <div class="config-panel">
          <div class="config-section-label">Primary</div>
          <div class="color-grid">
            @for (c of primaryColors; track c.name) {
              <button
                class="color-dot"
                [style.background]="c.hex"
                [class.selected]="themeService.selectedPrimary() === c.name"
                (click)="themeService.setPrimary(c.name)"
                [pTooltip]="c.name"
                tooltipPosition="top">
              </button>
            }
          </div>

          <div class="config-divider"></div>

          <div class="config-section-label">Surface</div>
          <div class="color-grid">
            @for (key of surfaceKeys; track key) {
              <button
                class="color-dot"
                [style.background]="surfaceHex(key)"
                [class.selected]="themeService.selectedSurface() === key"
                (click)="themeService.setSurface(key)"
                [pTooltip]="key"
                tooltipPosition="top">
              </button>
            }
          </div>

          <div class="config-divider"></div>

          <div class="config-section-label">Mode</div>
          <div class="mode-group">
            @for (t of themeModes; track t.mode) {
              <button
                class="mode-btn"
                [class.active]="themeService.mode() === t.mode"
                (click)="themeService.setMode(t.mode)">
                <i [class]="t.icon"></i>
                {{ t.label }}
              </button>
            }
          </div>
        </div>
      }
    </div>

    <button class="icon-btn" pTooltip="Notifications" tooltipPosition="bottom">
      <i class="pi pi-bell"></i>
    </button>
  </div>
</header>
