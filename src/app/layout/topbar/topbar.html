<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">Operations Console</span>
  </div>

  <div class="topbar-right">
    <div class="config-wrap">
      <p-button
        icon="pi pi-palette"
        severity="secondary"
        variant="text"
        size="small"
        (onClick)="toggleConfig()"
        pTooltip="Customise Theme"
        tooltipPosition="bottom"
        class="topbar-icon-btn" />

      @if (configOpen) {
        <div class="config-panel">
          <div class="config-section-label">Primary</div>
          <div class="color-grid">
            @for (c of primaryColors; track c.name) {
              <button
                class="color-dot"
                [style.background]="c.hex"
                [class.selected]="themeService.selectedPrimary() === c.name"
                (click)="themeService.setPrimary(c.name)"
                [pTooltip]="c.name"
                tooltipPosition="top"
                [attr.aria-label]="c.name">
              </button>
            }
          </div>
          <p-divider />
          <div class="config-section-label">Surface</div>
          <div class="color-grid">
            @for (key of surfaceKeys; track key) {
              <button
                class="color-dot"
                [style.background]="surfaceHex(key)"
                [class.selected]="themeService.selectedSurface() === key"
                (click)="themeService.setSurface(key)"
                [pTooltip]="key"
                tooltipPosition="top"
                [attr.aria-label]="key">
              </button>
            }
          </div>
          <p-divider />
          <div class="config-section-label">Mode</div>
          <p-selectButton
            [options]="themeModes"
            [(ngModel)]="selectedMode"
            optionLabel="label"
            optionValue="mode"
            class="theme-mode-select" />
        </div>
      }
    </div>

    <p-button
      icon="pi pi-bell"
      severity="secondary"
      variant="text"
      size="small"
      pTooltip="Notifications"
      tooltipPosition="bottom"
      class="topbar-icon-btn"
      (onClick)="openNotifications()" />
  </div>
</header>

<p-dialog
  [(visible)]="notificationsOpen"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  class="notifications-dialog"
  [style]="{ width: '420px' }">

  <ng-template pTemplate="header">
    <span class="nd-dialog-title">Notifications</span>
  </ng-template>

  <div class="nd-coming-soon">
    <div class="nd-cs-icon">
      <i class="pi pi-bell"></i>
    </div>
    <div class="nd-cs-title">Coming Soon</div>
    <div class="nd-cs-desc">Real-time notifications &amp; alerts will be available in a future release.</div>
    <p-tag value="Coming Soon" severity="secondary" />
  </div>

</p-dialog>
