<aside class="sidebar">

  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 2L3 6.5V11C3 15.14 6.41 19.02 11 20C15.59 19.02 19 15.14 19 11V6.5L11 2Z" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8 11L10 13L14 9" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      @if (item.children) {
        <button
          class="nav-item"
          [class.active]="featuresExpanded()"
          (click)="toggleFeatures($event)"
          [pTooltip]="item.label"
          tooltipPosition="right">
          <i [class]="item.icon"></i>
        </button>
        <div class="sub-nav" [class.expanded]="featuresExpanded()">
          @for (child of item.children; track child.route) {
            <a
              class="sub-item"
              [routerLink]="child.route"
              routerLinkActive="active"
              [pTooltip]="child.label"
              tooltipPosition="right">
              <i [class]="child.icon"></i>
            </a>
          }
        </div>
      } @else {
        <a class="nav-item"
           [routerLink]="item.route"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
           [pTooltip]="item.label"
           tooltipPosition="right">
          <i [class]="item.icon"></i>
        </a>
      }
    }
  </nav>

  <div class="sidebar-footer">
    <div class="account-avatar"
         pTooltip="Admin — Operator"
         tooltipPosition="right">
      A
    </div>
  </div>

</aside>
