<div class="page-content">
  <div class="page-header">
    <div class="header-row">
      <div>
        <h1>Call Logs</h1>
        <p>Full history of inbound AI voice agent calls</p>
      </div>
    </div>
  </div>

  <p-card>
    <p-table
      [value]="calls()"
      [lazy]="true"
      [paginator]="true"
      [rows]="limit()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 15, 25, 50]"
      (onPage)="onPageChange($event)"
      size="small"
      [tableStyle]="{ 'min-width': '50rem' }">
      <ng-template pTemplate="header">
        <tr>
          <th>Date &amp; Time</th>
          <th>Phone</th>
          <th>Caller Name</th>
          <th>Duration</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-call>
        <tr>
          <td>{{ call.date }}</td>
          <td><span class="phone-mono">{{ call.phone }}</span></td>
          <td>{{ call.callerName }}</td>
          <td>{{ call.duration }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="empty-state">
            @if (loading()) {
              <i class="pi pi-spin pi-spinner"></i>
              <p>Loading…</p>
            } @else {
              <i class="pi pi-phone"></i>
              <p>No call records yet</p>
            }
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
