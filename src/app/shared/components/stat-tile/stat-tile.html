<p-card styleClass="stat-tile-wrap">
  <div class="stat-top">
    <span class="stat-label">{{ label }}</span>
    <div class="stat-icon" [style.background]="'color-mix(in srgb, var(--p-primary-500) 12%, transparent)'" [style.color]="'var(--p-primary-500)'">
      <i [class]="icon"></i>
    </div>
  </div>
  <div class="stat-value">{{ value }}</div>
  <div class="stat-bottom">
    <span class="stat-subtitle">{{ subtitle }}</span>
    @if (trendLabel) {
      <p-tag
        [value]="trendLabel"
        [severity]="trend === 'up' ? 'success' : trend === 'down' ? 'danger' : 'secondary'"
        [icon]="trend === 'up' ? 'pi pi-arrow-up' : trend === 'down' ? 'pi pi-arrow-down' : 'pi pi-minus'"
        styleClass="trend-tag" />
    }
  </div>
</p-card>
